<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a30"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="g2" cx="30%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#0d0d24"/>
      <stop offset="100%" stop-color="#050508" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#g1)"/>
  <rect width="1280" height="720" fill="url(#g2)"/>
  <!-- futsal court lines -->
  <rect x="80" y="80" width="1120" height="560" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3" rx="32"/>
  <line x1="640" y1="80" x2="640" y2="640" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
  <circle cx="640" cy="360" r="80" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
  <circle cx="640" cy="360" r="5" fill="rgba(255,255,255,0.2)"/>
  <!-- goal areas -->
  <rect x="80" y="250" width="140" height="220" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="2" rx="20"/>
  <rect x="1060" y="250" width="140" height="220" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="2" rx="20"/>
  <!-- penalty spots -->
  <circle cx="260" cy="360" r="5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1020" cy="360" r="5" fill="rgba(255,255,255,0.15)"/>
  <!-- text -->
  <text x="640" y="340" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="80" font-weight="900" fill="rgba(255,255,255,0.08)" letter-spacing="8">FUTSAL</text>
  <text x="640" y="420" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="24" font-weight="700" fill="rgba(255,255,255,0.25)" letter-spacing="6">Replace with your cover image</text>
</svg>
